name: Build Flutter App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.5
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/EcoTV-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoTV-apk
          path: build/app/outputs/flutter-apk/EcoTV-release.apk

  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.5
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build IPA (Unsigned)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload
          zip -r EcoTV-unsigned.ipa Payload
          mkdir -p build/ios/ipa
          mv EcoTV-unsigned.ipa build/ios/ipa/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EcoTV-ipa
          path: build/ios/ipa/EcoTV-unsigned.ipa

  release:
    name: Create GitHub Release
    needs: [build_android, build_ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EcoTV-apk/*.apk
            EcoTV-ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
